{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password – AI Interview</title>
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

<div class="container">

    <div class="logo">
        <div class="icon-wrap">🔑</div>
        <h1>Forgot Password?</h1>
        <p>Enter your email and we'll send you a reset code.</p>
    </div>

    {% if error %}
    <div class="error">
        <i class="fa-solid fa-circle-exclamation"></i>
        {{ error }}
    </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="input-box">
            <i class="input-icon fa-regular fa-envelope"></i>
            <input type="email" name="email" placeholder="Your registered email" required autofocus>
        </div>
        <button class="btn" type="submit">
            Send Reset Code &nbsp;<i class="fa-solid fa-paper-plane"></i>
        </button>
    </form>

    <div class="divider">or</div>

    <div class="link">
        Remembered it?
        <a href="{% url 'login' %}">Back to Login</a>
    </div>

</div>
</body>
</html>
