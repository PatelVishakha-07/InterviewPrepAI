{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Register – AI Interview</title>
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

<div class="container">

    <div class="logo">
        <div class="icon-wrap">🤖</div>
        <h1>Create Account</h1>
        <p>Join and start practising interviews today.</p>
    </div>

    {% if error %}
    <div class="error">
        <i class="fa-solid fa-circle-exclamation"></i>
        {{ error }}
    </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="input-box">
            <i class="input-icon fa-regular fa-user"></i>
            <input type="text" name="fullname" placeholder="Full name" required>
        </div>

        <div class="input-box">
            <i class="input-icon fa-regular fa-envelope"></i>
            <input type="email" name="email" placeholder="Email address" required>
        </div>

        <div class="input-box">
            <i class="input-icon fa-solid fa-lock"></i>
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <div class="input-box">
            <i class="input-icon fa-solid fa-shield-halved"></i>
            <input type="password" name="confirm_password" placeholder="Confirm password" required>
        </div>

        <button class="btn" type="submit">
            Create Account &nbsp;<i class="fa-solid fa-arrow-right"></i>
        </button>
    </form>

    <div class="link">
        Already have an account?
        <a href="{% url 'login' %}">Sign in</a>
    </div>

</div>

</body>
</html>
